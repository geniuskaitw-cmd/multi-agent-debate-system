<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多智能體辯論與決策系統</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0B0F1A;--bg-card:#131825;--bg-alt:#1A2035;
      --em:#10B981;--am:#F59E0B;--vi:#8B5CF6;--cy:#06B6D4;
      --t1:#E8ECF4;--t2:#8B95A8;--t3:#505A6E;
      --bd:#1E2A3A;--err:#EF4444;--r:12px;--rs:8px;
    }
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t1);line-height:1.6;min-height:100vh;
      background-image:radial-gradient(ellipse 600px 400px at 20% 10%,rgba(16,185,129,.04) 0%,transparent 70%),radial-gradient(ellipse 500px 300px at 80% 80%,rgba(139,92,246,.03) 0%,transparent 70%)}
    .container{max-width:1280px;margin:0 auto;padding:2rem 1.5rem}
    .app-header{text-align:center;margin-bottom:2.5rem;position:relative}
    .app-header h1{font-size:1.6rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.4rem}
    .app-header h1 .ac{color:var(--em)}
    .app-header p{color:var(--t2);font-size:.9rem}
    .gear-btn{position:absolute;right:0;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .gear-btn:hover{border-color:var(--t2);color:var(--t1)}
    .card{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--r);padding:1.5rem;margin-bottom:1.5rem}
    .card-title{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
    .card-title::before{content:'';display:inline-block;width:3px;height:14px;background:var(--em);border-radius:2px}
</style>
</head>
<body>
<div class="container">
  <header class="app-header" role="banner">
    <h1>Multi-Agent <span class="ac">Debate</span> System</h1>
    <p>輸入您的想法，AI 智能體將進行結構化辯論，為您產出最佳方案</p>
    <button class="gear-btn" onclick="openSettings()" title="設定" aria-label="開啟設定">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </button>
  </header>

  <!-- Input -->
  <section class="card input-section">
    <h2 class="card-title">INPUT</h2>
    <textarea id="user-input" placeholder="請輸入您的原始想法或問題" rows="5"></textarea>
    <div class="input-actions">
      <span id="char-count" class="char-count">0 字</span>
      <button id="btn-start" class="btn-primary" onclick="startDebate()">
        <span class="spinner"></span><span class="btn-text">LAUNCH DEBATE</span><span class="btn-loading-text">PROCESSING...</span>
      </button>
    </div>
  </section>

  <!-- Pipeline -->
  <section id="pipeline-section" class="card" style="display:none">
    <h2 class="card-title">PIPELINE</h2>
    <div id="pipeline" class="pipeline"></div>
  </section>

  <!-- Connection Banner -->
  <div id="conn-banner" class="conn-banner" style="display:none">
    <span>CONNECTION LOST</span>
    <button onclick="reconnect()">RECONNECT</button>
  </div>
</div>

<!-- User Input Display -->
<div class="container" style="padding-top:0">
  <section id="input-display" class="card" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
      <h2 class="card-title" style="margin-bottom:0">ORIGINAL INPUT</h2>
      <button class="btn-s" onclick="copyEl('input-text')">COPY</button>
    </div>
    <div id="input-text" class="cblock"></div>
  </section>

  <!-- Round History (collapsible) -->
  <section id="history-section" class="card" style="display:none">
    <div class="history-header" onclick="toggleHistory()">
      <h2 class="card-title" style="margin-bottom:0;cursor:pointer">DEBATE HISTORY</h2>
      <svg id="history-chevron" class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div id="history-body" class="history-body collapsed">
      <div id="round-tabs" class="round-tabs"></div>
      <div id="round-content" class="round-content"></div>
    </div>
  </section>

  <!-- Proposals -->
  <section id="proposals-section" class="card" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <h2 class="card-title" style="margin-bottom:0">FINAL PROPOSALS</h2>
      <div style="display:flex;gap:.4rem">
        <button class="btn-s" onclick="toggleView()">VIEW</button>
        <button class="btn-s" onclick="exportAll('txt')">TXT</button>
        <button class="btn-s" onclick="exportAll('html')">PDF</button>
      </div>
    </div>
    <div id="proposals" class="pgrid"></div>
  </section>

  <!-- Scoring -->
  <section id="scoring-section" class="card" style="display:none">
    <h2 class="card-title">EVALUATION</h2>
    <div id="rationale-box" class="rationale" style="display:none"></div>
    <div class="scoring-layout">
      <div class="radar-wrap"><canvas id="radar-chart"></canvas></div>
      <div class="table-wrap"><table id="score-table"><thead></thead><tbody></tbody></table></div>
    </div>
  </section>
</div>

<!-- Settings Modal -->
<div id="settings-overlay" class="overlay" style="display:none" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">SETTINGS</span>
      <button class="btn-s" onclick="closeSettings()">CLOSE</button>
    </div>
    <div class="modal-body">
      <label class="field-label">辯論輪數 (1-10)</label>
      <input type="number" id="cfg-rounds" min="1" max="10" value="3" class="field-input field-sm">
      <label class="field-label">Agent A — 創新驅動者 System Prompt</label>
      <textarea id="cfg-pa" class="field-input" rows="6"></textarea>
      <label class="field-label">Agent B — 風險控制者 System Prompt</label>
      <textarea id="cfg-pb" class="field-input" rows="6"></textarea>
      <label class="field-label">Agent C — 總結決策者 System Prompt</label>
      <textarea id="cfg-pc" class="field-input" rows="6"></textarea>
      <label class="field-label">Agent D — 獨立評審 System Prompt</label>
      <textarea id="cfg-pd" class="field-input" rows="6"></textarea>
      <div style="display:flex;gap:.5rem;margin-top:1rem">
        <button class="btn-primary" onclick="saveSettings()">SAVE</button>
        <button class="btn-s" onclick="resetDefaults()">RESET DEFAULTS</button>
      </div>
    </div>
  </div>
</div>

<style>
  textarea,.field-input{width:100%;padding:.8rem;background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);color:var(--t1);font-family:inherit;font-size:.88rem;line-height:1.6;resize:vertical;transition:border-color .3s}
  textarea:focus,.field-input:focus{outline:none;border-color:var(--em);box-shadow:0 0 0 3px rgba(16,185,129,.1)}
  textarea:disabled{opacity:.4;cursor:not-allowed}
  textarea::placeholder{color:var(--t3)}
  .input-actions{display:flex;justify-content:flex-end;align-items:center;margin-top:.75rem;gap:1rem}
  .char-count{color:var(--t3);font-size:.75rem;font-variant-numeric:tabular-nums}
  .btn-primary{display:inline-flex;align-items:center;gap:.5rem;padding:.6rem 1.4rem;background:var(--em);color:#fff;border:none;border-radius:var(--rs);font-size:.78rem;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:all .2s}
  .btn-primary:hover:not(:disabled){background:#059669;box-shadow:0 0 20px rgba(16,185,129,.2)}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed}
  .btn-primary .spinner{display:none;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
  .btn-primary.loading .spinner{display:inline-block}
  .btn-primary.loading .btn-text{display:none}
  .btn-primary.loading .btn-loading-text{display:inline}
  .btn-primary .btn-loading-text{display:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  .btn-s{display:inline-flex;align-items:center;padding:.3rem .6rem;background:transparent;border:1px solid var(--bd);border-radius:6px;color:var(--t3);font-size:.68rem;font-weight:600;letter-spacing:.04em;cursor:pointer;transition:all .2s}
  .btn-s:hover{border-color:var(--t2);color:var(--t1)}
  /* Pipeline */
  .pipeline{display:flex;align-items:center;gap:0;overflow-x:auto;padding:1.2rem 0;justify-content:center}
  .pnode{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:.5rem;min-width:100px}
  .pcircle{width:52px;height:52px;border-radius:50%;border:2.5px solid var(--bd);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:700;color:var(--t3);transition:all .4s}
  .pnode[data-type="round"] .pcircle{border-color:#2A3548}
  .pnode[data-type="syn"] .pcircle{border-color:#2A3548}
  .pnode[data-type="score"] .pcircle{border-color:#2A3548}
  .pnode.active .pcircle{box-shadow:0 0 20px var(--node-color,.3);animation:pglow 2s ease-in-out infinite;border-color:var(--node-color);color:var(--node-color)}
  .pnode.done .pcircle{background:var(--node-color);border-color:var(--node-color);color:#fff;box-shadow:0 0 12px color-mix(in srgb,var(--node-color) 40%,transparent)}
  .pnode.err .pcircle{border-color:var(--err);background:var(--err);color:#fff}
  @keyframes pglow{0%,100%{box-shadow:0 0 16px color-mix(in srgb,var(--node-color) 30%,transparent)}50%{box-shadow:0 0 28px color-mix(in srgb,var(--node-color) 50%,transparent)}}
  .plabel{font-size:.78rem;font-weight:600;color:var(--t3);text-align:center;transition:color .3s}
  .psub{font-size:.68rem;color:var(--t3);text-align:center;transition:color .3s}
  .pnode.active .plabel,.pnode.done .plabel{color:var(--t1)}
  .pnode.active .psub{color:var(--node-color)}
  .pnode.done .psub{color:var(--t2)}
  /* Flow connector with streaming light */
  .pconn{flex-shrink:0;width:36px;height:3px;background:var(--bd);transition:background .4s;position:relative;overflow:hidden;border-radius:2px}
  .pconn.active{background:linear-gradient(90deg,var(--conn-from,var(--em)),var(--conn-to,var(--em)));box-shadow:0 0 8px color-mix(in srgb,var(--conn-to) 30%,transparent)}
  .pconn.flowing::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);animation:flowlight 1.2s ease-in-out infinite}
  @keyframes flowlight{0%{left:-100%}100%{left:100%}}

  /* Content block */
  .cblock{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);padding:1rem;font-size:.85rem;line-height:1.7;color:var(--t2);white-space:pre-wrap;user-select:text}

  /* Connection banner */
  .conn-banner{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--err);border-radius:var(--rs);padding:.5rem 1rem;display:flex;align-items:center;gap:1rem;z-index:100;font-size:.75rem;font-weight:600;color:var(--err)}
  .conn-banner button{padding:.3rem .7rem;background:var(--err);color:#fff;border:none;border-radius:6px;font-size:.68rem;font-weight:700;cursor:pointer}

  .error-message{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:var(--rs);padding:.6rem 1rem;margin-top:.75rem;color:var(--err);font-size:.85rem}
  /* Collapsible history */
  .history-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
  .chevron{color:var(--t3);transition:transform .3s;flex-shrink:0}
  .chevron.open{transform:rotate(180deg)}
  .history-body{overflow:hidden;transition:max-height .4s ease,opacity .3s ease;max-height:2000px;opacity:1}
  .history-body.collapsed{max-height:0;opacity:0;margin-top:0}
  .history-body:not(.collapsed){margin-top:1rem}
  /* Round tabs & history */
  .round-tabs{display:flex;gap:.4rem;margin-bottom:1rem;flex-wrap:wrap}
  .round-tab{padding:.35rem .8rem;border:1px solid var(--bd);border-radius:6px;background:transparent;color:var(--t3);font-size:.7rem;font-weight:600;cursor:pointer;transition:all .2s}
  .round-tab:hover{border-color:var(--t2);color:var(--t1)}
  .round-tab.active{border-color:var(--em);color:var(--em);background:rgba(16,185,129,.08)}
  .round-content{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .round-panel{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);overflow:hidden}
  .round-panel-header{padding:.6rem .8rem;border-bottom:1px solid var(--bd);font-size:.72rem;font-weight:600;display:flex;align-items:center;gap:.4rem}
  .round-panel[data-agent="a"] .round-panel-header{border-top:2px solid var(--em);color:var(--em)}
  .round-panel[data-agent="b"] .round-panel-header{border-top:2px solid var(--am);color:var(--am)}
  .round-panel-body{padding:.8rem;font-size:.82rem;line-height:1.7;color:var(--t2);white-space:pre-wrap;max-height:300px;overflow-y:auto;user-select:text}
  .round-panel-body::-webkit-scrollbar{width:3px}
  .round-panel-body::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}

  /* Proposals */
  .pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
  .pgrid.single{grid-template-columns:1fr;max-width:700px;margin:0 auto}
  .pcard{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);overflow:hidden;display:flex;flex-direction:column;transition:border-color .3s}
  .pcard:hover{border-color:#2A3548}
  .pcard.rec{border-color:var(--am)}
  .pcard-hd{padding:.6rem .8rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
  .pcard[data-a="a"] .pcard-hd{border-top:2px solid var(--em)}
  .pcard[data-a="b"] .pcard-hd{border-top:2px solid var(--am)}
  .pcard[data-a="c"] .pcard-hd{border-top:2px solid var(--vi)}
  .pcard-info{display:flex;align-items:center;gap:.4rem}
  .pcard-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff}
  .pcard[data-a="a"] .pcard-icon{background:var(--em)}
  .pcard[data-a="b"] .pcard-icon{background:var(--am)}
  .pcard[data-a="c"] .pcard-icon{background:var(--vi)}
  .pcard-name{font-size:.78rem;font-weight:600}
  .pcard-badges{display:flex;gap:.3rem;align-items:center}
  .badge-score{font-size:.68rem;font-weight:700;padding:.1rem .4rem;border-radius:4px;background:rgba(255,255,255,.04);color:var(--t2)}
  .badge-rec{font-size:.62rem;font-weight:700;padding:.1rem .4rem;border-radius:4px;background:var(--am);color:#000}
  .pcard-acts{padding:.4rem .8rem;display:flex;justify-content:flex-end}
  .pcard-body{padding:.8rem;flex:1;font-size:.82rem;line-height:1.7;color:var(--t2);white-space:pre-wrap;max-height:320px;overflow-y:auto;user-select:text}
  .pcard-body::-webkit-scrollbar{width:3px}
  .pcard-body::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
  /* Rationale & Scoring */
  .rationale{background:var(--bg-alt);border:1px solid var(--bd);border-left:3px solid var(--am);border-radius:var(--rs);padding:1rem;margin-bottom:1rem;font-size:.82rem;line-height:1.7;color:var(--t2)}
  .rationale-label{font-size:.68rem;font-weight:700;color:var(--am);letter-spacing:.06em;margin-bottom:.3rem;text-transform:uppercase}
  .scoring-layout{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;align-items:start}
  .radar-wrap{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);padding:1rem;display:flex;align-items:center;justify-content:center}
  .radar-wrap canvas{max-width:100%;max-height:360px}
  .table-wrap{overflow-x:auto}
  .table-wrap table{width:100%;border-collapse:collapse;font-size:.78rem}
  .table-wrap th,.table-wrap td{padding:.5rem .6rem;text-align:left;border-bottom:1px solid var(--bd)}
  .table-wrap th{color:var(--t3);font-weight:600;font-size:.68rem;text-transform:uppercase;letter-spacing:.04em}
  .scell{display:flex;flex-direction:column;gap:.1rem}
  .sval{font-weight:700;font-size:.88rem;color:var(--t1);font-variant-numeric:tabular-nums}
  .sval.hi{color:var(--em)}.sval.lo{color:var(--err)}
  .scmt{font-size:.7rem;color:var(--t3);line-height:1.3}
  .th-a{color:var(--em)!important}.th-b{color:var(--am)!important}.th-c{color:var(--vi)!important}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .modal{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--r);width:90%;max-width:700px;max-height:85vh;display:flex;flex-direction:column}
  .modal-header{padding:1rem 1.5rem;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
  .modal-title{font-size:.8rem;font-weight:700;letter-spacing:.06em;color:var(--t3);text-transform:uppercase}
  .modal-body{padding:1.5rem;overflow-y:auto;flex:1}
  .field-label{display:block;font-size:.72rem;font-weight:600;color:var(--t3);margin-bottom:.3rem;margin-top:1rem;text-transform:uppercase;letter-spacing:.04em}
  .field-label:first-child{margin-top:0}
  .field-sm{max-width:120px}

  @media(max-width:768px){
    .round-content,.pgrid,.scoring-layout{grid-template-columns:1fr}
    .pipeline{justify-content:flex-start}
  }
</style>

<script>
(function(){
  'use strict';
  var ta=document.getElementById('user-input'),btn=document.getElementById('btn-start'),cc=document.getElementById('char-count');
  var pipeSec=document.getElementById('pipeline-section'),pipeEl=document.getElementById('pipeline');
  var connBanner=document.getElementById('conn-banner');
  var sessionId=null,es=null,singleCol=false;
  var userConfig={rounds:3,prompt_a:'',prompt_b:'',prompt_c:'',prompt_d:''};
  var defaults={};

  ta.addEventListener('input',function(){cc.textContent=this.value.length+' 字'});

  // Load defaults
  fetch('/settings/defaults').then(function(r){return r.json()}).then(function(d){
    defaults=d;
    document.getElementById('cfg-rounds').value=d.default_rounds||3;
    document.getElementById('cfg-pa').value=d.prompt_a||'';
    document.getElementById('cfg-pb').value=d.prompt_b||'';
    document.getElementById('cfg-pc').value=d.prompt_c||'';
    document.getElementById('cfg-pd').value=d.prompt_d||'';
  }).catch(function(){});

  // Settings
  window.openSettings=function(){document.getElementById('settings-overlay').style.display='flex'};
  window.closeSettings=function(){document.getElementById('settings-overlay').style.display='none'};
  window.saveSettings=function(){
    userConfig.rounds=parseInt(document.getElementById('cfg-rounds').value)||3;
    userConfig.prompt_a=document.getElementById('cfg-pa').value.trim();
    userConfig.prompt_b=document.getElementById('cfg-pb').value.trim();
    userConfig.prompt_c=document.getElementById('cfg-pc').value.trim();
    userConfig.prompt_d=document.getElementById('cfg-pd').value.trim();
    closeSettings();
  };
  window.resetDefaults=function(){
    document.getElementById('cfg-rounds').value=defaults.default_rounds||3;
    document.getElementById('cfg-pa').value=defaults.prompt_a||'';
    document.getElementById('cfg-pb').value=defaults.prompt_b||'';
    document.getElementById('cfg-pc').value=defaults.prompt_c||'';
    document.getElementById('cfg-pd').value=defaults.prompt_d||'';
  };
  // Pipeline colors per node type
  var nodeColors={round:'#06B6D4',syn:'#8B5CF6',score:'#F59E0B'};

  function buildPipeline(totalRounds){
    pipeEl.innerHTML='';
    for(var i=1;i<=totalRounds;i++){
      if(i>1){var c=document.createElement('div');c.className='pconn';c.dataset.after='r'+(i-1);c.style.setProperty('--conn-from',nodeColors.round);c.style.setProperty('--conn-to',nodeColors.round);pipeEl.appendChild(c)}
      var n=document.createElement('div');n.className='pnode';n.dataset.id='r'+i;n.dataset.type='round';n.style.setProperty('--node-color',nodeColors.round);
      n.innerHTML='<div class="pcircle">R'+i+'</div><div class="plabel">ROUND '+i+'</div><div class="psub">辯論</div>';
      pipeEl.appendChild(n);
    }
    // Connector round→syn
    var c2=document.createElement('div');c2.className='pconn';c2.dataset.after='r'+totalRounds;c2.style.setProperty('--conn-from',nodeColors.round);c2.style.setProperty('--conn-to',nodeColors.syn);pipeEl.appendChild(c2);
    var ns=document.createElement('div');ns.className='pnode';ns.dataset.id='syn';ns.dataset.type='syn';ns.style.setProperty('--node-color',nodeColors.syn);
    ns.innerHTML='<div class="pcircle">C</div><div class="plabel">SYNTHESIS</div><div class="psub">收斂</div>';
    pipeEl.appendChild(ns);
    // Connector syn→score
    var c3=document.createElement('div');c3.className='pconn';c3.dataset.after='syn';c3.style.setProperty('--conn-from',nodeColors.syn);c3.style.setProperty('--conn-to',nodeColors.score);pipeEl.appendChild(c3);
    var nd=document.createElement('div');nd.className='pnode';nd.dataset.id='score';nd.dataset.type='score';nd.style.setProperty('--node-color',nodeColors.score);
    nd.innerHTML='<div class="pcircle">D</div><div class="plabel">SCORING</div><div class="psub">評分</div>';
    pipeEl.appendChild(nd);
  }

  function setPipeState(id,state){
    var n=pipeEl.querySelector('[data-id="'+id+'"]');
    if(!n)return;
    n.classList.remove('active','done','err');
    n.classList.add(state);
    var sub=n.querySelector('.psub');
    if(state==='active')sub.textContent='進行中...';
    else if(state==='done')sub.textContent='完成';
    else if(state==='err')sub.textContent='錯誤';
    // Activate preceding connectors with flow animation
    pipeEl.querySelectorAll('.pconn').forEach(function(c){
      var afterId=c.dataset.after;
      var afterN=pipeEl.querySelector('[data-id="'+afterId+'"]');
      if(afterN&&afterN.classList.contains('done')){c.classList.add('active');c.classList.remove('flowing')}
    });
    // Add flowing animation to connector leading INTO the active node
    if(state==='active'){
      pipeEl.querySelectorAll('.pconn').forEach(function(c){
        var next=c.nextElementSibling;
        if(next&&next.dataset.id===id){c.classList.add('active','flowing')}
      });
    }
  }

  function setDisabled(d){ta.disabled=d;btn.disabled=d;d?btn.classList.add('loading'):btn.classList.remove('loading')}
  function showErr(m){clearErr();var d=document.createElement('div');d.className='error-message';d.textContent=m;ta.parentNode.insertBefore(d,ta.nextSibling)}
  function clearErr(){var e=document.querySelector('.input-section .error-message');if(e)e.remove()}
  // SSE
  function connectSSE(sid){
    if(es)es.close();
    es=new EventSource('/debates/'+sid+'/stream');
    es.addEventListener('round_start',function(e){
      var d=JSON.parse(e.data);
      // Mark preceding rounds done
      for(var i=1;i<d.current_round;i++)setPipeState('r'+i,'done');
      setPipeState('r'+d.current_round,'active');
    });
    es.addEventListener('round_complete',function(e){
      var d=JSON.parse(e.data);
      setPipeState('r'+d.current_round,'done');
    });
    es.addEventListener('synthesis_start',function(){setPipeState('syn','active')});
    es.addEventListener('scoring_start',function(){setPipeState('syn','done');setPipeState('score','active')});
    es.addEventListener('debate_complete',function(){
      setPipeState('score','done');
      btn.classList.remove('loading');
      closeSSE();
      fetchFinal(sid);
    });
    es.addEventListener('error',function(e){
      if(e.data){var d=JSON.parse(e.data);showErr(d.error_message||'錯誤')}
      btn.classList.remove('loading');closeSSE();
    });
    es.onerror=function(){connBanner.style.display='flex';closeSSE()};
  }
  function closeSSE(){if(es){es.close();es=null}}

  window.reconnect=function(){
    connBanner.style.display='none';
    if(sessionId)fetch('/debates/'+sessionId).then(function(r){return r.json()}).then(function(s){
      if(s.current_phase!=='completed'&&s.current_phase!=='failed')connectSSE(sessionId);
    }).catch(function(){});
  };

  function fetchFinal(sid){
    fetch('/debates/'+sid).then(function(r){return r.json()}).then(function(s){
      window.__dr=s;
      showInput(s.user_input);
      renderHistory(s);
      renderProposals(s);
      renderScoring(s);
    }).catch(function(){});
  }

  // Start
  window.startDebate=function(){
    clearErr();
    var input=ta.value.trim();
    if(!input){showErr('請輸入您的想法');ta.focus();return}
    // Read current settings
    saveSettings();
    setDisabled(true);
    var body={user_input:input,config:{
      rounds:userConfig.rounds,
      prompt_a:userConfig.prompt_a,prompt_b:userConfig.prompt_b,
      prompt_c:userConfig.prompt_c,prompt_d:userConfig.prompt_d
    }};
    fetch('/debates',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){if(!r.ok)return r.json().then(function(b){throw new Error(b.detail||'失敗')});return r.json()})
    .then(function(d){
      sessionId=d.session_id;
      buildPipeline(userConfig.rounds);
      pipeSec.style.display='block';
      pipeSec.scrollIntoView({behavior:'smooth'});
      connectSSE(sessionId);
    }).catch(function(e){setDisabled(false);showErr(e.message)});
  };

  // Utilities
  function esc(s){if(!s)return '';var d=document.createElement('div');d.textContent=s;return d.innerHTML}

  window.copyEl=function(id){
    var el=document.getElementById(id);
    if(!el)return;
    navigator.clipboard.writeText(el.textContent).catch(function(){});
  };

  function copyText(txt){
    navigator.clipboard.writeText(txt||'').catch(function(){});
  }
  window.copyText=copyText;

  window.copyProposal=function(agent){
    var s=window.__dr;if(!s)return;
    if(agent==='a')copyText(s.a_responses[s.a_responses.length-1]||'');
    else if(agent==='b')copyText(s.b_responses[s.b_responses.length-1]||'');
    else if(agent==='c')copyText(s.c1||'');
  };

  // Show input
  function showInput(text){
    var sec=document.getElementById('input-display');
    document.getElementById('input-text').textContent=text||'';
    sec.style.display='block';
  }

  // Toggle history collapse
  window.toggleHistory=function(){
    var body=document.getElementById('history-body');
    var chev=document.getElementById('history-chevron');
    body.classList.toggle('collapsed');
    chev.classList.toggle('open');
  };

  // Render round history
  function renderHistory(state){
    var sec=document.getElementById('history-section');
    var tabs=document.getElementById('round-tabs');
    var content=document.getElementById('round-content');
    var total=Math.max(state.a_responses.length,state.b_responses.length);
    if(total===0){sec.style.display='none';return}
    sec.style.display='block';
    tabs.innerHTML='';content.innerHTML='';

    for(var i=0;i<total;i++){
      var t=document.createElement('button');
      t.className='round-tab'+(i===total-1?' active':'');
      t.textContent='ROUND '+(i+1);
      t.dataset.round=i;
      t.onclick=function(){
        tabs.querySelectorAll('.round-tab').forEach(function(b){b.classList.remove('active')});
        this.classList.add('active');
        showRound(parseInt(this.dataset.round),state);
      };
      tabs.appendChild(t);
    }
    showRound(total-1,state);
  }

  function showRound(idx,state){
    var content=document.getElementById('round-content');
    content.innerHTML='';
    var pa=document.createElement('div');pa.className='round-panel';pa.dataset.agent='a';
    pa.innerHTML='<div class="round-panel-header"><span>A</span> Agent A — Round '+(idx+1)+'<span style="margin-left:auto"><button class="btn-s" onclick="copyText(this.closest(\'.round-panel\').querySelector(\'.round-panel-body\').textContent)">COPY</button></span></div><div class="round-panel-body">'+(esc(state.a_responses[idx])||'—')+'</div>';
    var pb=document.createElement('div');pb.className='round-panel';pb.dataset.agent='b';
    pb.innerHTML='<div class="round-panel-header"><span>B</span> Agent B — Round '+(idx+1)+'<span style="margin-left:auto"><button class="btn-s" onclick="copyText(this.closest(\'.round-panel\').querySelector(\'.round-panel-body\').textContent)">COPY</button></span></div><div class="round-panel-body">'+(esc(state.b_responses[idx])||'—')+'</div>';
    content.appendChild(pa);content.appendChild(pb);
  }

  // Render proposals
  function renderProposals(state){
    var sec=document.getElementById('proposals-section');
    var grid=document.getElementById('proposals');
    var aFinal=state.a_responses.length?state.a_responses[state.a_responses.length-1]:'';
    var bFinal=state.b_responses.length?state.b_responses[state.b_responses.length-1]:'';
    var c1=state.c1||'';
    var sc=state.scores;
    var rec=sc?sc.recommended:'';

    grid.innerHTML='';grid.className='pgrid'+(singleCol?' single':'');

    var items=[
      {agent:'a',label:'Agent A',sub:'創新方案',text:aFinal,key:'a_score',recKey:'a_final'},
      {agent:'b',label:'Agent B',sub:'保守方案',text:bFinal,key:'b_score',recKey:'b_final'},
      {agent:'c',label:'Agent C',sub:'折衷方案',text:c1,key:'c1_score',recKey:'c1'}
    ];

    items.forEach(function(it){
      var card=document.createElement('div');card.className='pcard'+(rec===it.recKey?' rec':'');card.dataset.a=it.agent;
      var overall=sc&&sc[it.key]?sc[it.key].overall_recommendation.score:'—';
      var isRec=rec===it.recKey;
      card.innerHTML='<div class="pcard-hd"><div class="pcard-info"><div class="pcard-icon">'+it.agent.toUpperCase()+'</div><div><div class="pcard-name">'+it.label+'</div></div></div><div class="pcard-badges"><span class="badge-score">'+overall+'/10</span>'+(isRec?'<span class="badge-rec">RECOMMENDED</span>':'')+'</div></div><div class="pcard-body">'+esc(it.text)+'</div><div class="pcard-acts"><button class="btn-s" onclick="copyProposal(\''+it.agent+'\')">COPY</button></div>';
      grid.appendChild(card);
    });
    sec.style.display='block';
  }

  // Render scoring
  var radarChart=null;
  function renderScoring(state){
    var sec=document.getElementById('scoring-section');
    var sc=state.scores;
    if(!sc){sec.style.display='none';return}
    sec.style.display='block';

    // Rationale
    var rb=document.getElementById('rationale-box');
    if(sc.rationale){
      rb.innerHTML='<div class="rationale-label">EVALUATION RATIONALE</div>'+esc(sc.rationale);
      rb.style.display='block';
    }else{rb.style.display='none'}

    // Radar chart
    var dims=['feasibility','innovation','risk_control','cost_effectiveness','overall_recommendation'];
    var labels=['可行性','創新性','風險控制','成本效益','綜合推薦'];
    var aData=dims.map(function(d){return sc.a_score[d].score});
    var bData=dims.map(function(d){return sc.b_score[d].score});
    var cData=dims.map(function(d){return sc.c1_score[d].score});

    var ctx=document.getElementById('radar-chart').getContext('2d');
    if(radarChart)radarChart.destroy();
    radarChart=new Chart(ctx,{
      type:'radar',
      data:{
        labels:labels,
        datasets:[
          {label:'Agent A',data:aData,borderColor:'#10B981',backgroundColor:'rgba(16,185,129,.12)',pointBackgroundColor:'#10B981',borderWidth:2},
          {label:'Agent B',data:bData,borderColor:'#F59E0B',backgroundColor:'rgba(245,158,11,.12)',pointBackgroundColor:'#F59E0B',borderWidth:2},
          {label:'Agent C',data:cData,borderColor:'#8B5CF6',backgroundColor:'rgba(139,92,246,.12)',pointBackgroundColor:'#8B5CF6',borderWidth:2}
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:true,
        scales:{r:{min:0,max:10,ticks:{stepSize:2,color:'#505A6E',backdropColor:'transparent',font:{size:10}},grid:{color:'rgba(30,42,58,.6)'},angleLines:{color:'rgba(30,42,58,.6)'},pointLabels:{color:'#8B95A8',font:{size:11}}}},
        plugins:{legend:{labels:{color:'#8B95A8',font:{size:11},usePointStyle:true,pointStyle:'circle'}}}
      }
    });

    // Score table
    var thead=document.querySelector('#score-table thead');
    var tbody=document.querySelector('#score-table tbody');
    thead.innerHTML='<tr><th>維度</th><th class="th-a">Agent A</th><th class="th-b">Agent B</th><th class="th-c">Agent C</th></tr>';
    tbody.innerHTML='';
    dims.forEach(function(d,i){
      var a=sc.a_score[d],b=sc.b_score[d],c=sc.c1_score[d];
      var vals=[a.score,b.score,c.score];
      var mx=Math.max.apply(null,vals),mn=Math.min.apply(null,vals);
      function cls(v){return v===mx?'hi':v===mn?'lo':''}
      var tr=document.createElement('tr');
      tr.innerHTML='<td>'+labels[i]+'</td><td><div class="scell"><span class="sval '+cls(a.score)+'">'+a.score+'</span><span class="scmt">'+esc(a.comment)+'</span></div></td><td><div class="scell"><span class="sval '+cls(b.score)+'">'+b.score+'</span><span class="scmt">'+esc(b.comment)+'</span></div></td><td><div class="scell"><span class="sval '+cls(c.score)+'">'+c.score+'</span><span class="scmt">'+esc(c.comment)+'</span></div></td>';
      tbody.appendChild(tr);
    });
  }

  // Toggle view
  window.toggleView=function(){
    singleCol=!singleCol;
    var grid=document.getElementById('proposals');
    grid.className='pgrid'+(singleCol?' single':'');
  };

  // Export
  window.exportAll=function(fmt){
    var s=window.__dr;if(!s)return;
    var aFinal=s.a_responses.length?s.a_responses[s.a_responses.length-1]:'';
    var bFinal=s.b_responses.length?s.b_responses[s.b_responses.length-1]:'';
    var sc=s.scores;

    if(fmt==='txt'){
      var lines=[];
      lines.push('=== 多智能體辯論結果 ===\n');
      lines.push('原始輸入：\n'+s.user_input+'\n');
      for(var i=0;i<s.a_responses.length;i++){
        lines.push('--- Round '+(i+1)+' ---');
        lines.push('Agent A：\n'+s.a_responses[i]+'\n');
        lines.push('Agent B：\n'+s.b_responses[i]+'\n');
      }
      lines.push('--- 最終方案 ---');
      lines.push('Agent A 最終方案：\n'+aFinal+'\n');
      lines.push('Agent B 最終方案：\n'+bFinal+'\n');
      lines.push('Agent C 折衷方案：\n'+(s.c1||'')+'\n');
      if(sc){
        lines.push('--- 評分 ---');
        lines.push('推薦方案：'+sc.recommended);
        if(sc.rationale)lines.push('評分理由：'+sc.rationale);
        var dims=['feasibility','innovation','risk_control','cost_effectiveness','overall_recommendation'];
        var dlabels=['可行性','創新性','風險控制','成本效益','綜合推薦'];
        dims.forEach(function(d,j){
          lines.push(dlabels[j]+'：A='+sc.a_score[d].score+' B='+sc.b_score[d].score+' C='+sc.c1_score[d].score);
        });
      }
      var blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
      dl(blob,'debate-result.txt');
    }else{
      var h='<!DOCTYPE html><html><head><meta charset="utf-8"><title>辯論結果</title><style>body{font-family:sans-serif;max-width:800px;margin:2rem auto;padding:0 1rem;line-height:1.8;color:#222}h1{font-size:1.4rem}h2{font-size:1.1rem;margin-top:1.5rem;border-bottom:1px solid #ddd;padding-bottom:.3rem}h3{font-size:1rem;margin-top:1rem}pre{white-space:pre-wrap;background:#f5f5f5;padding:1rem;border-radius:6px;font-size:.9rem}.rec{color:#059669;font-weight:bold}</style></head><body>';
      h+='<h1>多智能體辯論結果</h1>';
      h+='<h2>原始輸入</h2><pre>'+esc(s.user_input)+'</pre>';
      for(var i=0;i<s.a_responses.length;i++){
        h+='<h2>Round '+(i+1)+'</h2>';
        h+='<h3>Agent A</h3><pre>'+esc(s.a_responses[i])+'</pre>';
        h+='<h3>Agent B</h3><pre>'+esc(s.b_responses[i])+'</pre>';
      }
      h+='<h2>最終方案</h2>';
      h+='<h3>Agent A 最終方案</h3><pre>'+esc(aFinal)+'</pre>';
      h+='<h3>Agent B 最終方案</h3><pre>'+esc(bFinal)+'</pre>';
      h+='<h3>Agent C 折衷方案</h3><pre>'+esc(s.c1||'')+'</pre>';
      if(sc){
        h+='<h2>評分結果</h2>';
        h+='<p class="rec">推薦方案：'+esc(sc.recommended)+'</p>';
        if(sc.rationale)h+='<p>'+esc(sc.rationale)+'</p>';
      }
      h+='</body></html>';
      var blob=new Blob([h],{type:'text/html;charset=utf-8'});
      dl(blob,'debate-result.html');
    }
  };

  function dl(blob,name){
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
  }

})();
</script>
</body>
</html>
